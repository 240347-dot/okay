<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика 3 - Рейтинг и Достижения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .full-width {
            grid-column: span 3;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 20px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        h3 {
            font-size: 16px;
            margin: 16px 0 12px 0;
            color: #333;
        }

        /* Профиль */
        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .user-name h3 {
            margin: 0;
            font-size: 18px;
        }

        .user-name p {
            font-size: 12px;
            color: #666;
        }

        /* Кнопки статусов */
        .status-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-btn {
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
        }

        .status-btn:active { transform: scale(0.98); }
        .btn-study { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-break { background: linear-gradient(135deg, #ffc107, #fd7e14); color: #333; }
        .btn-end { background: linear-gradient(135deg, #dc3545, #c82333); }
        .btn-exit { background: linear-gradient(135deg, #6c757d, #495057); }

        /* Таймер */
        .timer-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            margin-top: 16px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #28a745;
        }

        /* Достижения */
        .achievements-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .achievement-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f2f5;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        .achievement-badge.locked {
            opacity: 0.4;
            filter: grayscale(0.3);
        }

        .achievement-badge.unlocked {
            background: linear-gradient(135deg, #f9d423, #ff4e50);
            color: white;
        }

        .achievement-icon {
            font-size: 18px;
        }

        /* Рейтинг */
        .rating-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .rating-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .rating-rank {
            width: 30px;
            font-weight: bold;
            font-size: 16px;
        }

        .rating-rank.gold { color: #ffd700; }
        .rating-rank.silver { color: #c0c0c0; }
        .rating-rank.bronze { color: #cd7f32; }

        .rating-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 600;
        }

        .rating-points {
            font-size: 11px;
            color: #666;
        }

        .rating-time {
            font-size: 12px;
            font-family: monospace;
            color: #28a745;
        }

        /* Монитор группы */
        .group-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .group-member {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Чат */
        .chat-messages {
            height: 250px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            max-width: 80%;
        }

        .chat-message.me {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            outline: none;
        }

        .chat-send {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 16px;
        }

        .hidden { display: none; }

        /* Страница входа */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            text-align: center;
            max-width: 400px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Страница входа -->
    <div id="loginPage" class="login-container">
        <div class="card login-card">
            <h2>📊 Монитор статусов</h2>
            <p style="margin: 16px 0;">Войдите через Google</p>
            <button class="google-btn" id="loginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Войти через Google
            </button>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app" class="container hidden">
        <!-- Колонка 1: Профиль и статус -->
        <div class="card">
            <div class="user-header">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-name">
                    <h3 id="userName">Загрузка...</h3>
                    <p id="userEmail"></p>
                </div>
                <button id="logoutButton" style="margin-left: auto; padding: 8px 12px; background: #dc3545; color: white; border: none; border-radius: 12px; cursor: pointer;">🚪</button>
            </div>

            <h2>📊 Учебная сессия</h2>
            <div class="status-buttons">
                <button class="status-btn btn-study" data-status="study">📚 Учусь</button>
                <button class="status-btn btn-break" data-status="break">☕ Перерыв</button>
                <button class="status-btn btn-end" data-status="end">🏁 Завершить</button>
                <button class="status-btn btn-exit" data-status="exit">🚪 Выход</button>
            </div>

            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00:00</div>
            </div>

            <h2>🏆 Мои достижения</h2>
            <div class="achievements-list" id="achievementsList">
                <div style="text-align: center; padding: 20px;">Загрузка...</div>
            </div>
        </div>

        <!-- Колонка 2: Рейтинг топ студентов -->
        <div class="card">
            <h2>📈 Топ студентов</h2>
            <div class="rating-list" id="ratingList">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </div>

        <!-- Колонка 3: Монитор группы -->
        <div class="card">
            <h2>👥 Монитор группы</h2>
            <div class="group-list" id="groupList">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </div>

        <!-- Чат на всю ширину -->
        <div class="card full-width">
            <h2>💬 Общий чат</h2>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                <button class="chat-send" id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://dsbllavkdvjrclihfbwv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jMtOL78wL9cxkMDOTi40pg_Gqco-1zy';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let studySeconds = 0;
        let studyTimer = null;
        let heartbeatInterval = null;
        let messageCount = 0;

        // Элементы DOM
        const loginPage = document.getElementById('loginPage');
        const app = document.getElementById('app');
        const loginBtn = document.getElementById('loginBtn');
        const logoutButton = document.getElementById('logoutButton');
        const userNameEl = document.getElementById('userName');
        const userEmailEl = document.getElementById('userEmail');
        const userAvatarEl = document.getElementById('userAvatar');
        const timerDisplay = document.getElementById('timerDisplay');
        const achievementsList = document.getElementById('achievementsList');
        const ratingList = document.getElementById('ratingList');
        const groupList = document.getElementById('groupList');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // ========== СПИСОК ДОСТИЖЕНИЙ ==========
        const ACHIEVEMENTS = {
            early_bird: { name: '🐦 Ранняя пташка', desc: 'Зашел до 8:00', icon: '🐦' },
            marathoner: { name: '🏃 Марафонец', desc: 'Проучился более 2 часов за раз', icon: '🏃' },
            activist: { name: '🎙 Активист', desc: 'Написал 20 сообщений в чате', icon: '🎙' },
            hardworker: { name: '💪 Трудяга', desc: 'Общее время учебы более 10 часов', icon: '💪' },
            consistent: { name: '📆 Постоянный', desc: 'Заходил 5 дней подряд', icon: '📆' },
            speedy: { name: '⚡ Скоростной', desc: 'Статус "Учусь" более 3 часов за день', icon: '⚡' }
        };

        // ========== ФУНКЦИИ ТАЙМЕРА ==========
        function startTimer() {
            if (studyTimer) clearInterval(studyTimer);
            studyTimer = setInterval(() => {
                studySeconds++;
                updateTimerDisplay();
                if (studySeconds % 60 === 0) {
                    saveStudyTime();
                    checkMarathonAchievement();
                    checkHardworkerAchievement();
                }
            }, 1000);
        }

        function stopTimer() {
            if (studyTimer) {
                clearInterval(studyTimer);
                studyTimer = null;
            }
        }

        function updateTimerDisplay() {
            const hours = Math.floor(studySeconds / 3600);
            const minutes = Math.floor((studySeconds % 3600) / 60);
            const seconds = studySeconds % 60;
            timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        async function saveStudyTime() {
            if (!currentUser) return;
            await supabase
                .from('profiles')
                .update({ study_seconds: studySeconds })
                .eq('id', currentUser.id);
        }

        // ========== ПРОВЕРКА ДОСТИЖЕНИЙ ==========
        async function checkEarlyBirdAchievement() {
            const hour = new Date().getHours();
            if (hour < 8 && currentUser) {
                await unlockAchievement('early_bird');
            }
        }

        async function checkMarathonAchievement() {
            if (studySeconds >= 7200 && currentUser) { // 2 часа = 7200 секунд
                await unlockAchievement('marathoner');
            }
        }

        async function checkHardworkerAchievement() {
            const { data } = await supabase
                .from('profiles')
                .select('study_seconds')
                .eq('id', currentUser.id)
                .single();
            if (data && data.study_seconds >= 36000) { // 10 часов
                await unlockAchievement('hardworker');
            }
        }

        async function checkActivistAchievement() {
            const { count } = await supabase
                .from('messages')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id);
            if (count >= 20) {
                await unlockAchievement('activist');
            }
        }

        async function checkSpeedyAchievement() {
            const today = new Date().toISOString().split('T')[0];
            const { data } = await supabase
                .from('study_sessions')
                .select('total_seconds')
                .eq('user_id', currentUser.id)
                .eq('date', today)
                .single();
            if (data && data.total_seconds >= 10800) { // 3 часа
                await unlockAchievement('speedy');
            }
        }

        async function unlockAchievement(achievementKey) {
            if (!currentUser) return;
            
            const { data } = await supabase
                .from('user_achievements')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('achievement', achievementKey)
                .single();
            
            if (!data) {
                await supabase
                    .from('user_achievements')
                    .insert({
                        user_id: currentUser.id,
                        achievement: achievementKey,
                        unlocked_at: new Date().toISOString()
                    });
                await fetchAchievements();
                await fetchRating();
            }
        }

        async function fetchAchievements() {
            if (!currentUser) return;
            
            const { data } = await supabase
                .from('user_achievements')
                .select('achievement')
                .eq('user_id', currentUser.id);
            
            const unlockedSet = new Set(data?.map(a => a.achievement) || []);
            
            achievementsList.innerHTML = Object.entries(ACHIEVEMENTS).map(([key, ach]) => `
                <div class="achievement-badge ${unlockedSet.has(key) ? 'unlocked' : 'locked'}">
                    <span class="achievement-icon">${ach.icon}</span>
                    <span>${ach.name}</span>
                </div>
            `).join('');
        }

        // ========== РЕЙТИНГ ==========
        async function fetchRating() {
            const { data, error } = await supabase
                .from('profiles')
                .select('id, username, study_seconds')
                .order('study_seconds', { ascending: false })
                .limit(10);
            
            if (error) return;
            
            ratingList.innerHTML = data.map((user, index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';
                
                const hours = Math.floor(user.study_seconds / 3600);
                const minutes = Math.floor((user.study_seconds % 3600) / 60);
                
                return `
                    <div class="rating-item">
                        <div class="rating-rank ${rankClass}">${index + 1}</div>
                        <div class="rating-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                        <div class="rating-info">
                            <div class="rating-name">${escapeHtml(user.username)} ${user.id === currentUser?.id ? '(вы)' : ''}</div>
                            <div class="rating-points">🏆 ${user.study_seconds} сек</div>
                        </div>
                        <div class="rating-time">${hours}ч ${minutes}м</div>
                    </div>
                `;
            }).join('');
        }

        // ========== МОНИТОР ГРУППЫ ==========
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });
            
            if (error) return;
            
            const oneMinuteAgo = new Date(Date.now() - 60 * 1000).toISOString();
            
            groupList.innerHTML = data.map(user => {
                const isOnline = user.status_type !== 'exit' && user.last_active && user.last_active > oneMinuteAgo;
                let statusText = '', statusIcon = '';
                
                switch(user.status_type) {
                    case 'study': statusText = '📚 Учится'; statusIcon = '📚'; break;
                    case 'break': statusText = '☕ Перерыв'; statusIcon = '☕'; break;
                    case 'end': statusText = '🏁 Завершил'; statusIcon = '🏁'; break;
                    case 'exit': statusText = '⚫ Не в сети'; statusIcon = '⚫'; break;
                    default: statusText = '⚪ Не в сети'; statusIcon = '⚪';
                }
                
                const hours = Math.floor(user.study_seconds / 3600);
                const minutes = Math.floor((user.study_seconds % 3600) / 60);
                
                return `
                    <div class="group-member">
                        <div class="member-info">
                            <div class="member-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                            <div>
                                <div class="member-name">${escapeHtml(user.username)} ${isOnline ? '<span class="online-dot"></span>' : ''}</div>
                                <div>${statusIcon} ${statusText}</div>
                            </div>
                        </div>
                        <div>${hours}ч ${minutes}м</div>
                    </div>
                `;
            }).join('');
        }

        // ========== ЧАТ ==========
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || !currentUser) return;
            
            await supabase
                .from('messages')
                .insert({
                    user_id: currentUser.id,
                    username: currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0],
                    message: message,
                    created_at: new Date().toISOString()
                });
            
            chatInput.value = '';
            
            // Проверка достижения "Активист"
            const { count } = await supabase
                .from('messages')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id);
            messageCount = count;
            if (count >= 20) await unlockAchievement('activist');
        }
        
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);
            
            if (error) return;
            
            if (!data || data.length === 0) {
                chatMessages.innerHTML = '<div style="text-align: center; padding: 40px;">💬 Нет сообщений</div>';
                return;
            }
            
            chatMessages.innerHTML = data.map(msg => `
                <div class="chat-message ${msg.user_id === currentUser?.id ? 'me' : ''}">
                    <div class="sender">${escapeHtml(msg.username)}</div>
                    <div>${escapeHtml(msg.message)}</div>
                </div>
            `).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // ========== СТАТУС ==========
        async function updateStatus(statusType) {
            if (!currentUser) return;
            
            if (statusType === 'study' && !studyTimer) {
                startTimer();
            } else if (statusType !== 'study' && studyTimer) {
                stopTimer();
                await saveStudyTime();
            }
            
            if (statusType === 'exit') {
                studySeconds = 0;
                updateTimerDisplay();
                await saveStudyTime();
            }
            
            const statusLabels = {
                study: '📚 Учусь',
                break: '☕ Перерыв',
                end: '🏁 Завершил сессию',
                exit: '🚪 Выход'
            };
            
            await supabase
                .from('profiles')
                .update({
                    status_type: statusType,
                    status: statusLabels[statusType],
                    last_active: new Date().toISOString()
                })
                .eq('id', currentUser.id);
            
            await fetchGroup();
            await fetchRating();
        }
        
        // ========== АВТОРИЗАЦИЯ ==========
        async function syncProfile(user) {
            if (!user) return;
            
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();
            
            if (!data) {
                await supabase
                    .from('profiles')
                    .insert({
                        id: user.id,
                        username: user.user_metadata?.full_name || user.email?.split('@')[0],
                        email: user.email,
                        status_type: 'exit',
                        study_seconds: 0,
                        last_active: new Date().toISOString()
                    });
                studySeconds = 0;
            } else {
                studySeconds = data.study_seconds || 0;
                updateTimerDisplay();
                if (data.status_type === 'study') {
                    startTimer();
                }
            }
            
            await checkEarlyBirdAchievement();
            await fetchAchievements();
        }
        
        async function updateHeartbeat() {
            if (!currentUser) return;
            await supabase
                .from('profiles')
                .update({ last_active: new Date().toISOString() })
                .eq('id', currentUser.id);
            await fetchGroup();
        }
        
        function setupRealtimeSubscriptions() {
            supabase
                .channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                    fetchGroup();
                    fetchRating();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                    fetchMessages();
                    fetchRating();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'user_achievements' }, () => {
                    fetchAchievements();
                    fetchRating();
                })
                .subscribe();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        async function logout() {
            await supabase.auth.signOut();
            if (studyTimer) clearInterval(studyTimer);
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            loginPage.classList.remove('hidden');
            app.classList.add('hidden');
        }
        
        async function login() {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        }
        
        async function onAuthStateChange(user) {
            if (user) {
                currentUser = user;
                await syncProfile(user);
                
                userNameEl.textContent = user.user_metadata?.full_name || user.email;
                userEmailEl.textContent = user.email;
                userAvatarEl.textContent = (user.user_metadata?.full_name || user.email || 'U')[0].toUpperCase();
                
                await fetchGroup();
                await fetchMessages();
                await fetchRating();
                await fetchAchievements();
                
                heartbeatInterval = setInterval(updateHeartbeat, 30000);
                setupRealtimeSubscriptions();
                
                loginPage.classList.add('hidden');
                app.classList.remove('hidden');
            } else {
                currentUser = null;
                loginPage.classList.remove('hidden');
                app.classList.add('hidden');
            }
        }
        
        // ========== ОБРАБОТЧИКИ ==========
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                updateStatus(btn.getAttribute('data-status'));
            });
        });
        
        sendBtn?.addEventListener('click', sendMessage);
        chatInput?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        logoutButton?.addEventListener('click', logout);
        loginBtn?.addEventListener('click', login);
        
        // ========== ЗАПУСК ==========
        supabase.auth.getSession().then(({ data: { session } }) => {
            onAuthStateChange(session?.user || null);
        });
        
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') onAuthStateChange(null);
            else if (session?.user) onAuthStateChange(session.user);
        });
    </script>
</body>
</html>
