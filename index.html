<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов - Смена темы</title>
    <style>
        /* ========== СВЕТЛАЯ ТЕМА (по умолчанию) ========== */
        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1a1a2e;
            --border-color: #e0e0e0;
            --secondary-bg: #f8f9fa;
            --avatar-bg: #e0e7ff;
            --chat-bg: #f8f9fa;
            --message-bg: white;
            --message-me-bg: #667eea;
            --message-me-text: white;
            --input-border: #e0e0e0;
        }

        /* ========== ТЁМНАЯ ТЕМА ========== */
        body.dark {
            --bg-gradient-start: #0f0f1a;
            --bg-gradient-end: #0a0a12;
            --card-bg: rgba(30, 30, 47, 0.95);
            --text-color: #f0f0f0;
            --border-color: #3a3a5a;
            --secondary-bg: #1e1e2e;
            --avatar-bg: #2a2a3e;
            --chat-bg: #1a1a2a;
            --message-bg: #2a2a3e;
            --message-me-bg: #4f46e5;
            --message-me-text: white;
            --input-border: #3a3a5a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark .card {
            color: var(--text-color);
        }

        body.dark .user-name p,
        body.dark .member-status,
        body.dark .rating-time {
            color: #aaa;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transition: background 0.3s ease;
        }

        .full-width {
            grid-column: span 3;
        }

        h2 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 20px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .user-name h3 {
            font-size: 18px;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .user-name p {
            font-size: 12px;
            color: #666;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-btn {
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
        }

        .status-btn:active { transform: scale(0.98); }
        .btn-study { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-break { background: linear-gradient(135deg, #ffc107, #fd7e14); color: #333; }
        .btn-end { background: linear-gradient(135deg, #dc3545, #c82333); }
        .btn-exit { background: linear-gradient(135deg, #6c757d, #495057); }

        .timer-section {
            text-align: center;
            padding: 20px;
            background: var(--secondary-bg);
            border-radius: 20px;
            margin-top: 16px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #28a745;
        }

        .achievements-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            min-height: 120px;
        }

        .achievement-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--secondary-bg);
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
            color: var(--text-color);
        }

        .achievement-badge:hover {
            transform: scale(1.05);
        }

        .achievement-badge.locked {
            opacity: 0.4;
            filter: grayscale(0.3);
        }

        .achievement-badge.unlocked {
            background: linear-gradient(135deg, #f9d423, #ff4e50);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .rating-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .rating-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .rating-rank {
            width: 35px;
            font-weight: bold;
            font-size: 18px;
        }

        .rating-rank.gold { color: #ffd700; text-shadow: 0 0 2px #000; }
        .rating-rank.silver { color: #c0c0c0; }
        .rating-rank.bronze { color: #cd7f32; }

        .rating-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-color);
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .rating-time {
            font-size: 13px;
            font-family: monospace;
            color: #28a745;
            font-weight: bold;
        }

        .group-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .group-member {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-color);
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }

        .offline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            display: inline-block;
            margin-left: 6px;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .chat-messages {
            height: 250px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--chat-bg);
            border-radius: 16px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: var(--message-bg);
            border-radius: 12px;
            max-width: 80%;
            color: var(--text-color);
        }

        .chat-message.me {
            background: var(--message-me-bg);
            color: var(--message-me-text);
            margin-left: auto;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 24px;
            outline: none;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .chat-input::placeholder {
            color: #888;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-send {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .logout-btn {
            margin-left: auto;
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        /* НОВЫЕ КНОПКИ */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .btn-stats {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .btn-theme {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }

        /* Модальное окно статистики */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: var(--text-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-label {
            font-weight: 600;
            color: var(--text-color);
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
        }

        .hidden { display: none; }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            text-align: center;
            max-width: 400px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .google-btn:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }

        .theme-icon {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <!-- Страница входа -->
    <div id="loginPage" class="login-container">
        <div class="card login-card">
            <h2>📊 Монитор статусов</h2>
            <p style="margin: 16px 0;">Войдите через Google</p>
            <button class="google-btn" id="loginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Войти через Google
            </button>
        </div>
    </div>

    <!-- Модальное окно статистики -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Моя статистика</h2>
                <button class="modal-close" onclick="closeStatsModal()">✕</button>
            </div>
            <div id="statsContent">
                <div style="text-align: center; padding: 20px;">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app" class="container hidden">
        <!-- Колонка 1 -->
        <div class="card">
            <div class="user-header">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-name">
                    <h3 id="userName">Загрузка...</h3>
                    <p id="userEmail"></p>
                </div>
                <button id="logoutButton" class="logout-btn">🚪 Выйти</button>
            </div>

            <h2>📊 Учебная сессия</h2>
            <div class="status-buttons">
                <button class="status-btn btn-study" data-status="study">📚 Учусь</button>
                <button class="status-btn btn-break" data-status="break">☕ Перерыв</button>
                <button class="status-btn btn-end" data-status="end">🏁 Завершить</button>
                <button class="status-btn btn-exit" data-status="exit">🚪 Выход</button>
            </div>

            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00:00</div>
            </div>

            <!-- НОВЫЕ КНОПКИ: Статистика + Смена темы -->
            <div class="action-buttons">
                <button class="action-btn btn-stats" id="statsBtn">📋 Моя статистика</button>
                <button class="action-btn btn-theme" id="themeBtn">🎨 Сменить тему</button>
            </div>

            <h2>🏆 Мои достижения</h2>
            <div class="achievements-list" id="achievementsList">
                <div style="text-align: center; width: 100%; color: #888;">Загрузка...</div>
            </div>
        </div>

        <!-- Колонка 2 -->
        <div class="card">
            <h2>📈 Топ студентов</h2>
            <div class="rating-list" id="ratingList">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </div>

        <!-- Колонка 3 -->
        <div class="card">
            <h2>👥 Монитор группы</h2>
            <div class="group-list" id="groupList">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </div>

        <!-- Чат -->
        <div class="card full-width">
            <h2>💬 Общий чат</h2>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                <button class="chat-send" id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://dsbllavkdvjrclihfbwv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jMtOL78wL9cxkMDOTi40pg_Gqco-1zy';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let studySeconds = 0;
        let studyTimer = null;
        let heartbeatInterval = null;

        // DOM элементы
        const loginPage = document.getElementById('loginPage');
        const app = document.getElementById('app');
        const loginBtn = document.getElementById('loginBtn');
        const logoutButton = document.getElementById('logoutButton');
        const userNameEl = document.getElementById('userName');
        const userEmailEl = document.getElementById('userEmail');
        const userAvatarEl = document.getElementById('userAvatar');
        const timerDisplay = document.getElementById('timerDisplay');
        const achievementsList = document.getElementById('achievementsList');
        const ratingList = document.getElementById('ratingList');
        const groupList = document.getElementById('groupList');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const statsBtn = document.getElementById('statsBtn');
        const themeBtn = document.getElementById('themeBtn');
        const statsModal = document.getElementById('statsModal');

        // Список достижений
        const ACHIEVEMENTS = [
            { key: 'early_bird', name: '🐦 Ранняя пташка', desc: 'Зашел до 8:00', icon: '🐦' },
            { key: 'marathoner', name: '🏃 Марафонец', desc: 'Проучился 2 часа подряд', icon: '🏃' },
            { key: 'activist', name: '🎙 Активист', desc: 'Написал 20 сообщений', icon: '🎙' },
            { key: 'hardworker', name: '💪 Трудяга', desc: 'Всего 10+ часов учебы', icon: '💪' },
            { key: 'speedy', name: '⚡ Скоростной', desc: 'Учился 3+ часа за день', icon: '⚡' }
        ];

        // ========== ФУНКЦИЯ 1: ПОКАЗАТЬ СТАТИСТИКУ ==========
        window.showStats = async function() {
            if (!currentUser) return;
            
            try {
                // Получаем количество сообщений
                const { count: messagesCount } = await supabase
                    .from('messages')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);
                
                // Получаем достижения
                const { data: achievements } = await supabase
                    .from('user_achievements')
                    .select('achievement')
                    .eq('user_id', currentUser.id);
                
                // Получаем профиль
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('study_seconds, username, email, created_at')
                    .eq('id', currentUser.id)
                    .single();
                
                const totalHours = Math.floor((profile?.study_seconds || 0) / 3600);
                const totalMinutes = Math.floor(((profile?.study_seconds || 0) % 3600) / 60);
                
                // Статус
                let statusText = '⚪ Не в сети';
                if (profile?.status_type === 'study') statusText = '📚 Учится';
                else if (profile?.status_type === 'break') statusText = '☕ Перерыв';
                else if (profile?.status_type === 'end') statusText = '🏁 Завершил';
                
                const joinDate = profile?.created_at ? new Date(profile.created_at).toLocaleDateString('ru-RU') : 'Неизвестно';
                const lastActive = profile?.last_active ? new Date(profile.last_active).toLocaleString('ru-RU') : 'Неизвестно';
                
                const statsHTML = `
                    <div class="stat-item">
                        <span class="stat-label">👤 Имя пользователя</span>
                        <span class="stat-value">${escapeHtml(profile?.username || '—')}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📧 Email</span>
                        <span class="stat-value">${escapeHtml(profile?.email || '—')}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🟢 Текущий статус</span>
                        <span class="stat-value">${statusText}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">⏱ Общее время учебы</span>
                        <span class="stat-value">${totalHours}ч ${totalMinutes}м</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">💬 Сообщений в чате</span>
                        <span class="stat-value">${messagesCount || 0}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🏆 Получено достижений</span>
                        <span class="stat-value">${achievements?.length || 0} / ${ACHIEVEMENTS.length}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📅 Дата регистрации</span>
                        <span class="stat-value">${joinDate}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🕐 Последняя активность</span>
                        <span class="stat-value">${lastActive}</span>
                    </div>
                `;
                
                document.getElementById('statsContent').innerHTML = statsHTML;
                statsModal.classList.add('active');
            } catch (err) {
                console.error('Ошибка статистики:', err);
                document.getElementById('statsContent').innerHTML = '<div style="text-align: center; padding: 20px; color: red;">Ошибка загрузки</div>';
                statsModal.classList.add('active');
            }
        };
        
        window.closeStatsModal = function() {
            statsModal.classList.remove('active');
        };
        
        statsModal.addEventListener('click', (e) => {
            if (e.target === statsModal) closeStatsModal();
        });

        // ========== ФУНКЦИЯ 2: СМЕНА ТЕМЫ ==========
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark');
            
            if (isDark) {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeBtn.innerHTML = '🌙 Тёмная тема';
            } else {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerHTML = '☀️ Светлая тема';
            }
        }
        
        // Загрузка сохранённой темы
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeBtn.innerHTML = '☀️ Светлая тема';
            } else {
                document.body.classList.remove('dark');
                themeBtn.innerHTML = '🌙 Тёмная тема';
            }
        }

        // ========== ТАЙМЕР ==========
        function startTimer() {
            if (studyTimer) clearInterval(studyTimer);
            studyTimer = setInterval(() => {
                studySeconds++;
                updateTimerDisplay();
                if (studySeconds % 30 === 0) saveStudyTime();
                if (studySeconds >= 7200) unlockAchievement('marathoner');
            }, 1000);
        }

        function stopTimer() {
            if (studyTimer) {
                clearInterval(studyTimer);
                studyTimer = null;
            }
        }

        function updateTimerDisplay() {
            const hours = Math.floor(studySeconds / 3600);
            const minutes = Math.floor((studySeconds % 3600) / 60);
            const seconds = studySeconds % 60;
            timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        async function saveStudyTime() {
            if (!currentUser) return;
            await supabase
                .from('profiles')
                .update({ study_seconds: studySeconds })
                .eq('id', currentUser.id);
            
            if (studySeconds >= 36000) await unlockAchievement('hardworker');
            await fetchRating();
        }

        // ========== ДОСТИЖЕНИЯ ==========
        async function unlockAchievement(achievementKey) {
            if (!currentUser) return;
            
            try {
                const { data: existing } = await supabase
                    .from('user_achievements')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .eq('achievement', achievementKey)
                    .maybeSingle();
                
                if (existing) return;
                
                await supabase
                    .from('user_achievements')
                    .insert({
                        user_id: currentUser.id,
                        achievement: achievementKey,
                        unlocked_at: new Date().toISOString()
                    });
                
                await fetchAchievements();
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        async function fetchAchievements() {
            if (!currentUser) {
                achievementsList.innerHTML = '<div style="text-align: center; width: 100%; color: #888;">Войдите в аккаунт</div>';
                return;
            }
            
            try {
                const { data } = await supabase
                    .from('user_achievements')
                    .select('achievement')
                    .eq('user_id', currentUser.id);
                
                const unlockedSet = new Set(data?.map(a => a.achievement) || []);
                
                achievementsList.innerHTML = ACHIEVEMENTS.map(ach => `
                    <div class="achievement-badge ${unlockedSet.has(ach.key) ? 'unlocked' : 'locked'}" title="${ach.desc}">
                        <span>${ach.icon} ${ach.name}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        // ========== РЕЙТИНГ ==========
        async function fetchRating() {
            try {
                const { data } = await supabase
                    .from('profiles')
                    .select('id, username, study_seconds')
                    .order('study_seconds', { ascending: false })
                    .limit(10);
                
                if (!data || data.length === 0) {
                    ratingList.innerHTML = '<div style="text-align: center; padding: 40px;">Нет данных</div>';
                    return;
                }
                
                ratingList.innerHTML = data.map((user, index) => {
                    let rankClass = '';
                    if (index === 0) rankClass = 'gold';
                    else if (index === 1) rankClass = 'silver';
                    else if (index === 2) rankClass = 'bronze';
                    
                    const hours = Math.floor(user.study_seconds / 3600);
                    const minutes = Math.floor((user.study_seconds % 3600) / 60);
                    
                    return `
                        <div class="rating-item">
                            <div class="rating-rank ${rankClass}">${index + 1}</div>
                            <div class="rating-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                            <div class="rating-info">
                                <div class="rating-name">${escapeHtml(user.username)} ${user.id === currentUser?.id ? '✓' : ''}</div>
                            </div>
                            <div class="rating-time">${hours}ч ${minutes}м</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Ошибка рейтинга:', err);
            }
        }

        // ========== МОНИТОР ГРУППЫ ==========
        async function fetchGroup() {
            try {
                const { data } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('username');
                
                if (!data) return;
                
                const oneMinuteAgo = new Date(Date.now() - 60 * 1000).toISOString();
                
                groupList.innerHTML = data.map(user => {
                    const isOnline = user.status_type !== 'exit' && user.last_active && user.last_active > oneMinuteAgo;
                    let statusIcon = '';
                    let statusText = '';
                    
                    switch(user.status_type) {
                        case 'study': statusIcon = '📚'; statusText = 'Учится'; break;
                        case 'break': statusIcon = '☕'; statusText = 'Перерыв'; break;
                        case 'end': statusIcon = '🏁'; statusText = 'Завершил'; break;
                        default: statusIcon = '⚫'; statusText = 'Не в сети';
                    }
                    
                    const hours = Math.floor(user.study_seconds / 3600);
                    const minutes = Math.floor((user.study_seconds % 3600) / 60);
                    
                    return `
                        <div class="group-member">
                            <div class="member-info">
                                <div class="member-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                                <div>
                                    <b>${escapeHtml(user.username)}</b> ${isOnline ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>'}
                                    <div>${statusIcon} ${statusText}</div>
                                </div>
                            </div>
                            <div>${hours}ч ${minutes}м</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Ошибка группы:', err);
            }
        }

        // ========== ЧАТ ==========
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || !currentUser) return;
            
            try {
                await supabase
                    .from('messages')
                    .insert({
                        user_id: currentUser.id,
                        username: currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0],
                        message: message,
                        created_at: new Date().toISOString()
                    });
                
                chatInput.value = '';
                
                const { count } = await supabase
                    .from('messages')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);
                
                if (count >= 20) await unlockAchievement('activist');
            } catch (err) {
                console.error('Ошибка отправки:', err);
            }
        }
        
        async function fetchMessages() {
            try {
                const { data } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(50);
                
                if (!data || data.length === 0) {
                    chatMessages.innerHTML = '<div style="text-align: center; padding: 40px;">💬 Нет сообщений</div>';
                    return;
                }
                
                chatMessages.innerHTML = data.map(msg => `
                    <div class="chat-message ${msg.user_id === currentUser?.id ? 'me' : ''}">
                        <div><b>${escapeHtml(msg.username)}</b></div>
                        <div>${escapeHtml(msg.message)}</div>
                    </div>
                `).join('');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (err) {
                console.error('Ошибка чата:', err);
            }
        }
        
        // ========== СТАТУС ==========
        async function updateStatus(statusType) {
            if (!currentUser) return;
            
            if (statusType === 'study' && !studyTimer) {
                startTimer();
            } else if (statusType !== 'study' && studyTimer) {
                stopTimer();
                await saveStudyTime();
            }
            
            if (statusType === 'exit') {
                studySeconds = 0;
                updateTimerDisplay();
                await saveStudyTime();
            }
            
            const statusLabels = {
                study: '📚 Учусь',
                break: '☕ Перерыв',
                end: '🏁 Завершил',
                exit: '🚪 Выход'
            };
            
            await supabase
                .from('profiles')
                .update({
                    status_type: statusType,
                    status: statusLabels[statusType],
                    last_active: new Date().toISOString()
                })
                .eq('id', currentUser.id);
            
            await fetchGroup();
            await fetchRating();
        }
        
        async function updateHeartbeat() {
            if (!currentUser) return;
            await supabase
                .from('profiles')
                .update({ last_active: new Date().toISOString() })
                .eq('id', currentUser.id);
            fetchGroup();
        }
        
        // ========== АВТОРИЗАЦИЯ ==========
        async function syncProfile(user) {
            if (!user) return;
            
            try {
                const { data } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .maybeSingle();
                
                if (!data) {
                    await supabase
                        .from('profiles')
                        .insert({
                            id: user.id,
                            username: user.user_metadata?.full_name || user.email?.split('@')[0],
                            email: user.email,
                            status_type: 'exit',
                            status: '🚪 Выход',
                            study_seconds: 0,
                            last_active: new Date().toISOString(),
                            created_at: new Date().toISOString()
                        });
                    studySeconds = 0;
                } else {
                    studySeconds = data.study_seconds || 0;
                    updateTimerDisplay();
                    if (data.status_type === 'study') startTimer();
                }
                
                const hour = new Date().getHours();
                if (hour < 8) await unlockAchievement('early_bird');
                
                await fetchAchievements();
            } catch (err) {
                console.error('Ошибка синхронизации:', err);
            }
        }
        
        function setupRealtime() {
            const channel = supabase.channel('public');
            channel
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                    fetchGroup();
                    fetchRating();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                    fetchMessages();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'user_achievements' }, () => {
                    fetchAchievements();
                })
                .subscribe();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        async function logout() {
            await supabase.auth.signOut();
            if (studyTimer) clearInterval(studyTimer);
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            loginPage.classList.remove('hidden');
            app.classList.add('hidden');
        }
        
        async function login() {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        }
        
        async function onAuthStateChange(user) {
            if (user) {
                currentUser = user;
                await syncProfile(user);
                
                userNameEl.textContent = user.user_metadata?.full_name || user.email;
                userEmailEl.textContent = user.email;
                userAvatarEl.textContent = (user.user_metadata?.full_name || user.email || 'U')[0].toUpperCase();
                
                await fetchGroup();
                await fetchMessages();
                await fetchRating();
                await fetchAchievements();
                
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                heartbeatInterval = setInterval(updateHeartbeat, 30000);
                setupRealtime();
                
                loginPage.classList.add('hidden');
                app.classList.remove('hidden');
            } else {
                currentUser = null;
                loginPage.classList.remove('hidden');
                app.classList.add('hidden');
            }
        }
        
        // Обработчики
        loginBtn?.addEventListener('click', login);
        logoutButton?.addEventListener('click', logout);
        sendBtn?.addEventListener('click', sendMessage);
        chatInput?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        statsBtn?.addEventListener('click', () => showStats());
        themeBtn?.addEventListener('click', toggleTheme);
        
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => updateStatus(btn.getAttribute('data-status')));
        });
        
        // Слушаем изменения авторизации
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                onAuthStateChange(session.user);
            } else if (event === 'SIGNED_OUT') {
                onAuthStateChange(null);
            }
        });
        
        // Запуск
        supabase.auth.getSession().then(({ data: { session } }) => {
            onAuthStateChange(session?.user || null);
        });
        
        // Загрузка сохранённой темы
        loadTheme();
    </script>
</body>
</html>
