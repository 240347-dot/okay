<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика 2 - Индикатор онлайн и счетчик времени</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .full-width {
            grid-column: span 2;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 20px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        /* Профиль пользователя */
        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .user-name h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-name p {
            font-size: 12px;
            color: #666;
        }

        /* Кнопки статусов */
        .status-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-btn {
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }

        .status-btn:active {
            transform: scale(0.98);
        }

        .btn-study { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-break { background: linear-gradient(135deg, #ffc107, #fd7e14); color: #333; }
        .btn-end { background: linear-gradient(135deg, #dc3545, #c82333); }
        .btn-exit { background: linear-gradient(135deg, #6c757d, #495057); }

        /* Таймер */
        .timer-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            margin-top: 16px;
        }

        .timer-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #28a745;
        }

        /* Монитор группы */
        .group-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .group-member {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #667eea;
        }

        .member-name {
            font-weight: 600;
        }

        .member-status {
            font-size: 12px;
            color: #666;
        }

        .member-time {
            font-size: 12px;
            font-family: monospace;
            color: #28a745;
            font-weight: bold;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
            margin-right: 6px;
        }

        .offline-dot {
            background: #dc3545;
        }

        /* Чат */
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            max-width: 80%;
        }

        .chat-message.me {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .chat-message .sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .chat-message .text {
            font-size: 14px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-send {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .online-count {
            font-size: 14px;
            color: #28a745;
            margin-left: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Левая колонка: Профиль пользователя -->
        <div class="card">
            <div class="user-header">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-name">
                    <h3 id="userName">Загрузка...</h3>
                    <p id="userEmail"></p>
                </div>
            </div>

            <h2>📊 Учебная сессия</h2>
            <div class="status-buttons">
                <button class="status-btn btn-study" data-status="study" data-label="📚 Учусь">📚 Учусь</button>
                <button class="status-btn btn-break" data-status="break" data-label="☕ Перерыв">☕ Перерыв</button>
                <button class="status-btn btn-end" data-status="end" data-label="🏁 Завершить сессию">🏁 Завершить сессию</button>
                <button class="status-btn btn-exit" data-status="exit" data-label="🚪 Выход">🚪 Выход</button>
            </div>

            <div class="timer-section">
                <div class="timer-label">⏱ Время в учебе сегодня</div>
                <div class="timer-display" id="timerDisplay">00:00:00</div>
            </div>
        </div>

        <!-- Правая колонка: Монитор группы -->
        <div class="card">
            <h2>👥 Монитор группы <span id="onlineCount" class="online-count"></span></h2>
            <div class="group-list" id="groupList">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </div>

        <!-- Нижняя колонка: Общий чат -->
        <div class="card full-width">
            <h2>💬 Общий чат</h2>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; padding: 40px; color: #888;">Загрузка сообщений...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                <button class="chat-send" id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // ========== ТВОИ ДАННЫЕ SUPABASE ==========
        const SUPABASE_URL = 'https://dsbllavkdvjrclihfbwv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jMtOL78wL9cxkMDOTi40pg_Gqco-1zy';
        const GITHUB_PAGES_URL = 'https://240347-dot.github.io/okay/';
        // ==========================================

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let studyTimer = null;
        let studySeconds = 0;
        let currentStatus = 'exit';

        // Элементы DOM
        const userNameEl = document.getElementById('userName');
        const userEmailEl = document.getElementById('userEmail');
        const userAvatarEl = document.getElementById('userAvatar');
        const timerDisplay = document.getElementById('timerDisplay');
        const groupList = document.getElementById('groupList');
        const onlineCountSpan = document.getElementById('onlineCount');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // ========== ФУНКЦИИ ТАЙМЕРА ==========
        function startTimer() {
            if (studyTimer) clearInterval(studyTimer);
            studyTimer = setInterval(() => {
                studySeconds++;
                updateTimerDisplay();
                // Сохраняем время в БД каждые 10 секунд
                if (studySeconds % 10 === 0 && currentUser) {
                    saveStudyTime();
                }
            }, 1000);
        }

        function stopTimer() {
            if (studyTimer) {
                clearInterval(studyTimer);
                studyTimer = null;
            }
        }

        function resetTimer() {
            studySeconds = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const hours = Math.floor(studySeconds / 3600);
            const minutes = Math.floor((studySeconds % 3600) / 60);
            const seconds = studySeconds % 60;
            timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        async function saveStudyTime() {
            if (!currentUser) return;
            await supabase
                .from('profiles')
                .update({ study_seconds: studySeconds })
                .eq('id', currentUser.id);
        }

        async function loadStudyTime(userId) {
            const { data, error } = await supabase
                .from('profiles')
                .select('study_seconds, status')
                .eq('id', userId)
                .single();
            
            if (data && !error) {
                studySeconds = data.study_seconds || 0;
                updateTimerDisplay();
                if (data.status === 'study') {
                    startTimer();
                }
            }
        }

        // ========== ФУНКЦИИ СТАТУСА ==========
        async function updateStatus(statusLabel, statusType) {
            if (!currentUser) return;

            // Обработка таймера
            if (statusType === 'study') {
                if (currentStatus !== 'study') {
                    startTimer();
                }
            } else {
                if (currentStatus === 'study') {
                    stopTimer();
                    await saveStudyTime();
                }
                if (statusType === 'exit') {
                    resetTimer();
                    await saveStudyTime();
                }
            }

            currentStatus = statusType;

            const { error } = await supabase
                .from('profiles')
                .update({ 
                    status: statusLabel,
                    status_type: statusType,
                    last_active: new Date().toISOString()
                })
                .eq('id', currentUser.id);

            if (error) {
                console.error('Ошибка обновления статуса:', error);
            }
        }

        // ========== МОНИТОР ГРУППЫ ==========
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error('Ошибка загрузки группы:', error);
                return;
            }

            // Фильтруем онлайн (активность за последние 5 минут)
            const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
            const onlineUsers = data.filter(u => u.last_active > fiveMinutesAgo && u.status_type !== 'exit');
            const onlineCount = onlineUsers.length;
            onlineCountSpan.textContent = `🟢 Онлайн: ${onlineCount}`;

            groupList.innerHTML = data.map(user => {
                let statusText = '';
                let statusColor = '';
                
                switch(user.status_type) {
                    case 'study': statusText = '📚 Учится'; statusColor = '#28a745'; break;
                    case 'break': statusText = '☕ Перерыв'; statusColor = '#ffc107'; break;
                    case 'end': statusText = '🏁 Завершил'; statusColor = '#dc3545'; break;
                    case 'exit': statusText = '⚫ Не в сети'; statusColor = '#6c757d'; break;
                    default: statusText = user.status || '⚪ Не в сети'; statusColor = '#6c757d';
                }

                const isOnline = user.last_active > fiveMinutesAgo && user.status_type !== 'exit';
                const timeStr = user.study_seconds ? formatTime(user.study_seconds) : '0ч 0м';

                return `
                    <div class="group-member">
                        <div class="member-info">
                            <div class="member-avatar">${(user.username || 'U')[0].toUpperCase()}</div>
                            <div>
                                <div class="member-name">${escapeHtml(user.username)} ${isOnline ? '<span class="online-dot"></span>' : ''}</div>
                                <div class="member-status" style="color: ${statusColor}">${statusText}</div>
                            </div>
                        </div>
                        <div class="member-time">${timeStr}</div>
                    </div>
                `;
            }).join('');
        }

        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            if (hours > 0) return `${hours}ч ${minutes}м`;
            return `${minutes}м`;
        }

        // ========== ЧАТ ==========
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || !currentUser) return;

            const { error } = await supabase
                .from('messages')
                .insert({
                    user_id: currentUser.id,
                    username: currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0],
                    message: message,
                    created_at: new Date().toISOString()
                });

            if (error) {
                console.error('Ошибка отправки:', error);
            } else {
                chatInput.value = '';
            }
        }

        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            if (error) {
                console.error('Ошибка загрузки чата:', error);
                return;
            }

            if (!data || data.length === 0) {
                chatMessages.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">Нет сообщений. Напишите первое!</div>';
                return;
            }

            chatMessages.innerHTML = data.map(msg => `
                <div class="chat-message ${msg.user_id === currentUser?.id ? 'me' : ''}">
                    <div class="sender">${escapeHtml(msg.username)}</div>
                    <div class="text">${escapeHtml(msg.message)}</div>
                </div>
            `).join('');
            
            // Скролл вниз
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ========== АВТОРИЗАЦИЯ ==========
        async function syncProfile(user) {
            if (!user) return;

            const { error } = await supabase
                .from('profiles')
                .upsert({
                    id: user.id,
                    username: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь',
                    email: user.email,
                    avatar_url: user.user_metadata?.avatar_url || '',
                    status: '🚪 Выход',
                    status_type: 'exit',
                    study_seconds: 0,
                    last_active: new Date().toISOString()
                }, { onConflict: 'id' });

            if (error) console.error('Ошибка синхронизации:', error);
        }

        async function onAuthStateChange(user) {
            if (user) {
                currentUser = user;
                await syncProfile(user);
                
                userNameEl.textContent = user.user_metadata?.full_name || user.email;
                userEmailEl.textContent = user.email;
                userAvatarEl.textContent = (user.user_metadata?.full_name || user.email || 'U')[0].toUpperCase();
                
                await loadStudyTime(user.id);
                await fetchGroup();
                await fetchMessages();
                
                // Обновляем last_active каждые 30 секунд
                setInterval(async () => {
                    if (currentUser) {
                        await supabase
                            .from('profiles')
                            .update({ last_active: new Date().toISOString() })
                            .eq('id', currentUser.id);
                        fetchGroup();
                    }
                }, 30000);
                
                setupRealtimeSubscriptions();
            }
        }

        // ========== REALTIME ==========
        function setupRealtimeSubscriptions() {
            // Подписка на изменения profiles
            supabase
                .channel('profiles-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                    fetchGroup();
                })
                .subscribe();

            // Подписка на новые сообщения
            supabase
                .channel('messages-changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                    fetchMessages();
                })
                .subscribe();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        // Обработчики кнопок
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const statusType = btn.getAttribute('data-status');
                const statusLabel = btn.textContent;
                updateStatus(statusLabel, statusType);
            });
        });

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Авторизация
        supabase.auth.onAuthStateChange((event, session) => {
            onAuthStateChange(session?.user || null);
        });

        supabase.auth.getSession().then(({ data: { session } }) => {
            onAuthStateChange(session?.user || null);
        });
    </script>
</body>
</html>
